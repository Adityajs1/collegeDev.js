<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32 Smart Control</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #f0f4f8;
    --surface:  #ffffff;
    --border:   #dde3ea;
    --border2:  #c8d0da;
    --accent:   #2563eb;
    --accent-l: #eff4ff;
    --on:       #16a34a;
    --on-l:     #f0fdf4;
    --on-b:     #bbf7d0;
    --off:      #dc2626;
    --off-l:    #fff1f2;
    --warn:     #d97706;
    --warn-l:   #fffbeb;
    --warn-b:   #fde68a;
    --text:     #1e293b;
    --sub:      #64748b;
    --muted:    #94a3b8;
    --shadow:   0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.05);
    --shadow-lg:0 4px 16px rgba(0,0,0,.10), 0 1px 4px rgba(0,0,0,.06);
    --font:     'DM Sans', sans-serif;
    --mono:     'DM Mono', monospace;
    --radius:   14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: .45;
    pointer-events: none; z-index: 0;
  }
  .wrapper {
    position: relative; z-index: 1;
    max-width: 860px; margin: 0 auto;
    padding: 32px 20px 64px;
  }

  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--accent); display: grid; place-items: center;
    font-size: 22px; box-shadow: 0 4px 12px #2563eb44;
  }
  .brand-name { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
  .brand-sub  { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .5px; }

  /* connection pill */
  #conn-badge {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 12px; font-weight: 500;
    padding: 8px 16px; border-radius: 999px;
    background: var(--surface); border: 1.5px solid var(--border2);
    color: var(--muted); transition: all .25s;
    box-shadow: var(--shadow);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: all .3s; flex-shrink: 0; }
  #conn-badge.connected  { color: var(--on);   border-color: var(--on-b);   background: var(--on-l);  }
  #conn-badge.connected .dot  { background: var(--on);   box-shadow: 0 0 0 3px #bbf7d088; animation: pulse 2s infinite; }
  #conn-badge.connecting { color: var(--warn); border-color: var(--warn-b); background: var(--warn-l); }
  #conn-badge.connecting .dot { background: var(--warn); animation: blink .7s infinite; }
  #conn-badge.error      { color: var(--off);  border-color: #fecaca;       background: var(--off-l); }
  #conn-badge.error .dot      { background: var(--off); }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.85)} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* CONFIG BAR */
  .config-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px;
    display: flex; gap: 10px; flex-wrap: wrap;
    box-shadow: var(--shadow); margin-bottom: 28px;
  }
  .input-wrap { flex: 1; min-width: 220px; position: relative; }
  .input-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  .config-card input {
    width: 100%;
    background: var(--bg); border: 1.5px solid var(--border);
    color: var(--text); font-family: var(--mono); font-size: 13px;
    padding: 10px 12px 10px 36px; border-radius: 9px; outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .config-card input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px #2563eb18; }
  .config-card input::placeholder { color: var(--muted); }
  .btn-connect {
    background: var(--accent); color: white;
    font-family: var(--font); font-weight: 600; font-size: 14px;
    padding: 10px 24px; border: none; border-radius: 9px;
    cursor: pointer; transition: all .2s; white-space: nowrap;
    box-shadow: 0 2px 8px #2563eb44;
  }
  .btn-connect:hover  { background: #1d4ed8; box-shadow: 0 4px 14px #2563eb55; transform: translateY(-1px); }
  .btn-connect:active { transform: translateY(0); }
  .btn-connect.disc   { background: var(--off); box-shadow: 0 2px 8px #dc262644; }
  .btn-connect.disc:hover { background: #b91c1c; transform: translateY(-1px); }

  /* SECTION LABEL */
  .sec {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    letter-spacing: 2px; color: var(--muted); text-transform: uppercase;
    margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
  }
  .sec::after { content:''; flex:1; height:1px; background: var(--border); }

  /* RELAY GRID */
  .relay-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px; margin-bottom: 28px;
  }
  .relay-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 20px 18px 16px;
    display: flex; flex-direction: column; gap: 10px;
    box-shadow: var(--shadow); transition: all .25s;
  }
  .relay-card.on {
    border-color: var(--on-b);
    background: linear-gradient(160deg, #f0fdf4, #ffffff);
    box-shadow: var(--shadow-lg);
  }
  .rc-top { display: flex; align-items: center; justify-content: space-between; }
  .rc-label { font-size: 12px; font-weight: 600; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; }
  .rc-num { font-size: 36px; font-weight: 700; color: var(--border2); line-height: 1; transition: color .25s; }
  .relay-card.on .rc-num { color: var(--on); }
  .rc-pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    padding: 4px 10px; border-radius: 999px;
    background: var(--bg); color: var(--muted); border: 1px solid var(--border);
    transition: all .25s; width: fit-content;
  }
  .rc-pill .dot { width: 6px; height: 6px; }
  .relay-card.on .rc-pill { background: var(--on-l); color: var(--on); border-color: var(--on-b); }
  .relay-card.on .rc-pill .dot { background: var(--on); }
  .toggle-btn {
    width: 100%; padding: 9px;
    background: var(--bg); border: 1.5px solid var(--border);
    color: var(--sub); font-family: var(--font); font-weight: 600;
    font-size: 13px; border-radius: 8px; cursor: pointer;
    transition: all .2s; text-transform: uppercase; letter-spacing: .5px;
  }
  .relay-card.on .toggle-btn { background: var(--on-l); border-color: var(--on-b); color: var(--on); }
  .toggle-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--accent-l); }
  .toggle-btn:active:not(:disabled) { transform: scale(.97); }
  .toggle-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* PIR CARD */
  .pir-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 18px 22px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    box-shadow: var(--shadow); margin-bottom: 28px; transition: all .25s;
  }
  .pir-card.on { border-color: var(--warn-b); background: linear-gradient(160deg, #fffbeb, #ffffff); }
  .pir-icon {
    width: 42px; height: 42px; border-radius: 10px; flex-shrink: 0;
    background: var(--bg); border: 1.5px solid var(--border);
    display: grid; place-items: center; font-size: 20px; transition: all .25s;
  }
  .pir-card.on .pir-icon { background: var(--warn-l); border-color: var(--warn-b); }
  .pir-info { flex: 1; }
  .pir-title { font-size: 15px; font-weight: 700; }
  .pir-card.on .pir-title { color: var(--warn); }
  .pir-desc { font-size: 12px; color: var(--muted); margin-top: 3px; }

  /* toggle switch */
  .switch { position: relative; display: inline-block; width: 52px; height: 28px; flex-shrink: 0; }
  .switch input { display: none; }
  .slider {
    position: absolute; inset: 0; border-radius: 28px;
    background: var(--border2); cursor: pointer; transition: .25s;
  }
  .slider::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 22px; height: 22px; border-radius: 50%;
    background: white; transition: .25s; box-shadow: 0 1px 4px rgba(0,0,0,.2);
  }
  .switch input:checked + .slider { background: var(--warn); }
  .switch input:checked + .slider::after { transform: translateX(24px); }
  .switch input:disabled + .slider { opacity: .4; cursor: not-allowed; }

  /* LOG */
  .log-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow);
  }
  .log-hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--bg);
  }
  .log-title { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 2px; }
  .log-clear {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    background: none; border: 1px solid var(--border); padding: 3px 10px;
    border-radius: 5px; cursor: pointer; transition: all .2s;
  }
  .log-clear:hover { color: var(--off); border-color: #fca5a5; background: var(--off-l); }
  #log-body {
    height: 150px; overflow-y: auto; padding: 12px 18px;
    display: flex; flex-direction: column; gap: 3px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .log-entry { font-family: var(--mono); font-size: 12px; display: flex; gap: 12px; line-height: 1.6; }
  .log-time  { color: var(--muted); flex-shrink: 0; }
  .log-msg.info  { color: var(--accent); }
  .log-msg.ok    { color: var(--on); }
  .log-msg.warn  { color: var(--warn); }
  .log-msg.error { color: var(--off); }
  .log-msg.rx    { color: var(--sub); }

  @media(max-width:480px){
    .relay-grid { grid-template-columns: 1fr 1fr; }
    header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <div>
        <div class="brand-name">ESP32 Control</div>
        <div class="brand-sub">MQTT Dashboard</div>
      </div>
    </div>
    <div id="conn-badge">
      <span class="dot"></span>
      <span id="conn-text">Disconnected</span>
    </div>
  </header>

  <div class="config-card">
    <div class="input-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="7" y="7" width="10" height="10" rx="1"/>
        <path d="M7 9H5M7 12H4M7 15H5M17 9h2M17 12h3M17 15h2M9 7V5M12 7V4M15 7V5M9 17v2M12 17v3M15 17v2"/>
      </svg>
      <input id="device-id" placeholder="Device ID — e.g. ESP32_a1b2c3d4e5f6" spellcheck="false"
             onkeydown="if(event.key==='Enter') toggleConnect()"/>
    </div>
    <button class="btn-connect" id="btn-connect" onclick="toggleConnect()">Connect</button>
  </div>

  <div class="sec">Relay Control</div>
  <div class="relay-grid" id="relay-grid"></div>

  <div class="sec">Motion Sensor</div>
  <div class="pir-card" id="pir-card">
    <div class="pir-icon">🔍</div>
    <div class="pir-info">
      <div class="pir-title">PIR Auto-Off</div>
      <div class="pir-desc">Switches off all relays after 10 min of no motion</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="pir-toggle" onchange="sendPIR(this.checked)" disabled>
      <span class="slider"></span>
    </label>
  </div>

  <div class="sec">Activity Log</div>
  <div class="log-card">
    <div class="log-hdr">
      <span class="log-title">LIVE EVENTS</span>
      <button class="log-clear" onclick="clearLog()">Clear</button>
    </div>
    <div id="log-body"></div>
  </div>

</div>
<script>
let client     = null;
let baseTopic  = '';
let relayState = [false,false,false,false];
let pirState   = false;
let connected  = false;

/* build relay cards */
const grid = document.getElementById('relay-grid');
for (let i = 0; i < 4; i++) {
  grid.innerHTML += `
  <div class="relay-card" id="rc${i}">
    <div class="rc-top">
      <span class="rc-label">Relay</span>
      <span class="rc-num">${i+1}</span>
    </div>
    <div class="rc-pill"><span class="dot"></span><span id="rs${i}">Offline</span></div>
    <button class="toggle-btn" id="rb${i}" onclick="sendRelay(${i})" disabled>Toggle</button>
  </div>`;
}

function toggleConnect() {
  if (connected) { disconnect(); return; }
  const id = document.getElementById('device-id').value.trim();
  if (!id) { log('Enter a Device ID first', 'warn'); return; }
  connect(id);
}

function connect(deviceID) {
  baseTopic = 'home/' + deviceID;
  setBadge('connecting', 'Connecting…');
  const btn = document.getElementById('btn-connect');
  btn.textContent = 'Cancel'; btn.className = 'btn-connect disc';

  client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt', {
    clientId: 'web_' + Math.random().toString(16).slice(2,10),
    clean: true,
    connectTimeout: 8000,
    reconnectPeriod: 0
  });

  client.on('connect', () => {
    connected = true;
    setBadge('connected', 'Connected');
    btn.textContent = 'Disconnect';
    enableControls(true);
    client.subscribe(baseTopic + '/#');
    log('Connected to HiveMQ broker', 'ok');
    log('Listening on ' + baseTopic + '/#', 'info');
  });

  client.on('message', (topic, payload) => {
    const msg = payload.toString().trim();
    log('← ' + topic.replace(baseTopic,'~') + '   ' + msg, 'rx');
    for (let i = 0; i < 4; i++) {
      if (topic === baseTopic + '/relay/' + (i+1)) {
        relayState[i] = (msg === 'ON');
        updateRelay(i);
      }
    }
    if (topic === baseTopic + '/pir') { pirState = (msg === 'ON'); updatePIR(); }
  });

  client.on('error', err => { log('Error: ' + err.message, 'error'); disconnect(); });
  client.on('close', ()  => { if (connected) { log('Connection lost', 'warn'); disconnect(); } });
  log('Connecting to broker.hivemq.com…', 'info');
}

function disconnect() {
  connected = false;
  if (client) { client.end(true); client = null; }
  setBadge('', 'Disconnected');
  const btn = document.getElementById('btn-connect');
  btn.textContent = 'Connect'; btn.className = 'btn-connect';
  enableControls(false);
  for (let i = 0; i < 4; i++) {
    document.getElementById('rs'+i).textContent = 'Offline';
    document.getElementById('rc'+i).className = 'relay-card';
  }
  document.getElementById('pir-card').className = 'pir-card';
  document.getElementById('pir-toggle').checked = false;
}

function sendRelay(i) {
  if (!connected) return;
  relayState[i] = !relayState[i];
  const pl = relayState[i] ? 'ON' : 'OFF';
  client.publish(baseTopic + '/relay/' + (i+1), pl, { retain: true });
  log('→ relay/' + (i+1) + '  ' + pl, 'info');
  updateRelay(i);
}

function sendPIR(val) {
  if (!connected) return;
  const pl = val ? 'ON' : 'OFF';
  client.publish(baseTopic + '/pir', pl, { retain: true });
  log('→ pir  ' + pl, 'info');
  pirState = val; updatePIR();
}

function updateRelay(i) {
  document.getElementById('rc'+i).className = 'relay-card' + (relayState[i] ? ' on' : '');
  document.getElementById('rs'+i).textContent = relayState[i] ? 'ON' : 'OFF';
}
function updatePIR() {
  document.getElementById('pir-card').className = 'pir-card' + (pirState ? ' on' : '');
  document.getElementById('pir-toggle').checked = pirState;
}
function enableControls(en) {
  for (let i = 0; i < 4; i++) {
    document.getElementById('rb'+i).disabled = !en;
    document.getElementById('rs'+i).textContent = en ? (relayState[i] ? 'ON' : 'OFF') : 'Offline';
  }
  document.getElementById('pir-toggle').disabled = !en;
}
function setBadge(cls, txt) {
  document.getElementById('conn-badge').className = cls;
  document.getElementById('conn-text').textContent = txt;
}
function log(msg, type='info') {
  const body = document.getElementById('log-body');
  const t = new Date().toTimeString().slice(0,8);
  const el = document.createElement('div');
  el.className = 'log-entry';
  el.innerHTML = `<span class="log-time">${t}</span><span class="log-msg ${type}">${msg}</span>`;
  body.appendChild(el);
  body.scrollTop = body.scrollHeight;
  while (body.children.length > 80) body.removeChild(body.firstChild);
}
function clearLog() { document.getElementById('log-body').innerHTML = ''; }
log('Dashboard ready — paste your Device ID and press Connect', 'info');
</script>
</body>
</html>
