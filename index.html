<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #111111;
            --button-bg: #111111;
            --button-text: #ffffff;
        }

        body.dark {
            --bg: #121212;
            --text: #f5f5f5;
            --button-bg: #f5f5f5;
            --button-text: #121212;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
            transition: background-color 0.25s ease, color 0.25s ease;
        }

        #themeToggle {
            border: none;
            padding: 12px 18px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            background: var(--button-bg);
            color: var(--button-text);
            transition: background-color 0.25s ease, color 0.25s ease;
        }
    </style>
</head>
<body>
    <button id="themeToggle" type="button">Switch to Dark</button>
</body>
<script>
    const toggleButton = document.getElementById("themeToggle");
    const body = document.body;

    toggleButton.addEventListener("click", () => {
        body.classList.toggle("dark");
        toggleButton.textContent = body.classList.contains("dark")
            ? "Switch to Light"
            : "Switch to Dark";
    });
</script>
</html>
